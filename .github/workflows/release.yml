name: Build and publish Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test
        run: python -m unittest discover -s tests -v

      - name: Build standalone EXE
        run: |
          python -m pip install --disable-pip-version-check pyinstaller
          pyinstaller --noconfirm --clean --onefile --windowed --name FoodLottery app/food_lottery.py

      - name: Create release and upload EXE
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --title "Food Lottery $env:GITHUB_REF_NAME" --generate-notes
          gh release upload $env:GITHUB_REF_NAME dist/FoodLottery.exe --repo $env:GITHUB_REPOSITORY --clobber
